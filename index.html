<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FRIDAY OS</title>
    <style>
        body { background: #02060d; color: #00f3ff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        /* The Holographic Core */
        .hologram-container { position: relative; width: 220px; height: 220px; display: flex; align-items: center; justify-content: center; margin-bottom: 50px; cursor: pointer; }
        .ring { position: absolute; border-radius: 50%; border: 2px solid transparent; transition: all 0.3s ease; }
        .ring-1 { width: 100%; height: 100%; border-top: 3px solid #00f3ff; border-right: 3px solid #00f3ff; animation: spin-clockwise 4s linear infinite; box-shadow: 0 0 15px #00f3ff, inset 0 0 15px #00f3ff; }
        .ring-2 { width: 80%; height: 80%; border-bottom: 3px dashed #00f3ff; border-left: 3px dashed #00f3ff; animation: spin-counter 5s linear infinite; }
        .ring-3 { width: 60%; height: 60%; border-top: 2px dotted #00f3ff; border-bottom: 2px dotted #00f3ff; animation: spin-clockwise 3s linear infinite; }
        .core { width: 35%; height: 35%; background: rgba(0, 243, 255, 0.2); border: 2px solid #00f3ff; border-radius: 50%; box-shadow: 0 0 30px #00f3ff; animation: pulse 2s ease-in-out infinite; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* Hot Mic (Listening) Colors */
        .hologram-container.listening .ring-1, .hologram-container.listening .ring-2, .hologram-container.listening .ring-3 { border-color: #ff003c; box-shadow: 0 0 20px #ff003c, inset 0 0 20px #ff003c; }
        .hologram-container.listening .core { background: rgba(255, 0, 60, 0.2); border-color: #ff003c; box-shadow: 0 0 40px #ff003c; }

        /* Animations */
        @keyframes spin-clockwise { 100% { transform: rotate(360deg); } }
        @keyframes spin-counter { 100% { transform: rotate(-360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        /* The Live Captions Terminal */
        #terminal { width: 90%; max-width: 700px; height: 200px; border: 1px solid rgba(0, 243, 255, 0.3); background: rgba(0, 20, 40, 0.4); padding: 25px 20px 20px 20px; box-sizing: border-box; overflow-y: auto; text-shadow: 0 0 5px #00f3ff; text-align: left; position: relative; border-radius: 5px; box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1); }
        #terminal::before { content: "SYS.LOG // FRIDAY_OS"; position: absolute; top: 0; left: 0; background: rgba(0, 243, 255, 0.2); padding: 2px 10px; font-size: 0.75rem; font-weight: bold; letter-spacing: 2px; }
        .log-entry { margin-bottom: 12px; line-height: 1.5; animation: fade-in 0.3s ease; }
        .user-log { color: #ffffff; text-shadow: none; font-size: 0.9rem; }
        .friday-log { color: #00f3ff; font-weight: bold; font-size: 1.1rem; }
        .system-log { color: #aaaaaa; font-style: italic; font-size: 0.8rem; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hologram-container" id="start-btn">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="core">⚙️</div>
    </div>

    <div id="terminal">
        <div class="log-entry system-log">SYSTEM STANDBY. CLICK CORE TO INITIALIZE.</div>
    </div>

    <script>
        const BACKEND_URL = "https://friday-core.onrender.com/chat"; 
        
        const startBtn = document.getElementById('start-btn');
        const terminal = document.getElementById('terminal');
        let systemAwake = false;

        // Terminal Logging Function
        function addLog(text, type) {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = text;
            terminal.appendChild(entry);
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll to bottom
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addLog("CRITICAL ERROR: Speech module offline. Use Chrome.", "system-log");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;

            startBtn.addEventListener('click', () => {
                if (!systemAwake) {
                    systemAwake = true;
                    addLog("AUDIO LINK ESTABLISHED. WAITING FOR COMMAND...", "system-log");
                    startListening();
                }
            });

            function startListening() {
                try {
                    recognition.start();
                    startBtn.classList.add("listening");
                } catch (e) {}
            }

            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                startBtn.classList.remove("listening");
                addLog(`Boss: "${userText}"`, "user-log");

                try {
                    const response = await fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userText })
                    });
                    const data = await response.json();
                    
                    // Show FRIDAY's text in the terminal and speak it
                    addLog(`FRIDAY: ${data.reply}`, "friday-log");
                    speak(data.reply);
                } catch (error) {
                    addLog("CONNECTION LOST TO MAIN SERVER.", "system-log");
                    startListening(); 
                }
            };

            recognition.onend = () => {
                if (systemAwake && !window.speechSynthesis.speaking) {
                    startListening();
                }
            };
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const irishVoice = voices.find(v => v.lang.includes('en-IE')) || voices.find(v => v.lang.includes('en-GB'));
            if (irishVoice) utterance.voice = irishVoice;
            utterance.rate = 1.1; 
            
            utterance.onend = () => {
                if (systemAwake) startListening();
            };

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
